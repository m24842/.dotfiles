# ==========================
# ==== General settings ====
# ==========================

# Manage global environment variables
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# Remap prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Split windows
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %

# Window navigation
bind -n S-Left previous-window
bind -n S-Right next-window

# Pane navigation
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# Pane resizing
bind -n M-h resize-pane -L 2
bind -n M-l resize-pane -R 2
bind -n M-k resize-pane -U 2
bind -n M-j resize-pane -D 2

# Renumber windows
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Disable auto window renaming
set-option -g allow-rename off
set-window-option -g automatic-rename off

# Enable mouse control
set -g mouse on

# =========================
# ==== Visual settings ====
# =========================

# Color
set -g default-terminal "tmux-256color"

# Disable visual bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Clock mode
setw -g clock-mode-colour blue

# Copy mode
setw -g mode-style 'fg=black bg=red bold'

# Panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=blue'

# Statusbar
set -g status-position bottom
set -g status-justify centre
set -g status-style ''

set -g status-left 'guffies '
set -g status-left-length 50
set -g status-left-style 'fg=blue bold'

set -g status-right-style 'fg=blue bold'
set -g status-right '%Y-%m-%d %H:%M'
set -g status-right-length 50

setw -g window-status-current-style 'fg=red bold'
setw -g window-status-current-format ' [ #I #W ] '

setw -g window-status-style 'fg=white bold'
setw -g window-status-format ' #I #W '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# Messages
set -g message-style 'fg=red bg=blue bold'

# =========================
# ==== Plugin settings ====
# =========================

set -g @plugin_path '~/.config/tmux/plugins/'

# Rose Pine theme
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @rose_pine_date_time ''
set -g @rose_pine_directory 'on'

# TMUX
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
